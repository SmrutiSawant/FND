<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CredCheck - Sign Up</title>
    <link rel="stylesheet" href="login.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <!-- Left Section -->
        <div class="left-section">
            <h2>Access to <span>UNLIMITED</span> Fact Verification</h2>
            <p>Verify news, detect misinformation, and stay informed with unlimited resources.</p>
            
        </div>

        <!-- Right Section (Sign-Up Form) -->
        <div class="right-section">
            <h2>Create an account</h2>
            <form>
                <div class="input-box">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-box">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Enter Email" required>
                </div>
                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Create Password" required>
                </div>
                <button type="submit" class="signup-btn">Sign Up</button>
            </form>
            <p>Already have an account? <a href="#">Login</a></p>
            <p>- OR -</p>
            <div class="social-icons">
                <a href="#"><img src="google.png" alt="Google"></a>
                <a href="#"><img src="facebook.png" alt="Facebook"></a>
            </div>
        </div>
    </div>
</body>
</html>
